<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #222;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 40px;
            border-left: 5px solid #2ea44f;
            padding-left: 12px;
        }

        p {
            line-height: 1.8;
            font-size: 17px;
        }

        .tag {
            display: inline-block;
            background: #e8f5ee;
            color: #2ea44f;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
        }

        a {
            color: #0969da;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            color: #777;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>你好，我是 XXX</h1>
            <p>我是一名嵌入式软件工程师，主要关注 ESP32、LVGL、FPGA、上位机通信、本地大模型部署等方向。</p>

            <h2>技术方向</h2>
            <div>
                <span class="tag">ESP32</span>
                <span class="tag">ESP-IDF</span>
                <span class="tag">LVGL</span>
                <span class="tag">FPGA</span>
                <span class="tag">C/C++</span>
                <span class="tag">GitHub</span>
            </div>

            <h2>项目展示</h2>
            <p>
                这里可以放你的项目，例如：
            </p>
            <ul>
                <li>ESP32 网页文件服务器</li>
                <li>LVGL 图形界面项目</li>
                <li>FPGA ADC 数据采集与波形显示系统</li>
                <li>本地大模型部署方案</li>
            </ul>

            <h2>联系我</h2>
            <p>
                GitHub：<a href="#">你的 GitHub 链接</a><br>
                Email：your_email@example.com
            </p>
        </div>

        <div class="footer">
            © 2026 我的个人网站
        </div>
    </div>
</body>
</html>
